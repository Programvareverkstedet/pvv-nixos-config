name: "Eval nix flake"
on:
  pull_request:
  push:
jobs:
  evals:
    runs-on: debian-latest
    steps:
    - name: Install sudo
      run: apt-get install --update --assume-yes sudo

    - uses: actions/checkout@v6

    - uses: https://github.com/cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          show-trace = true
          max-jobs = auto
          trusted-users = root
          experimental-features = nix-command flakes
          build-users-group =

    - run: nix flake check
